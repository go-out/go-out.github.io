    <script type="text/javascript" src="index.js"></script>
    <script>
        // ?id=ID$date=YYYYMMDD
        let params = new URLSearchParams(location.search)
        if (params.get("id")) {
            if (params.get("date")) {
                indexJSON(params.get("id") + "/" + params.get("date") + ".json")
            } else {
                indexJSON(params.get("id") + "/index.json")
            }
        } else {
            indexJSON("index.json")
        }
    </script>
