    <script>
        // ?id=ID&area=エリア&name=名前&no=番号
        const directory = "../";
        let params = new URLSearchParams(location.search);
        let thisJson, thisID, thisArea, thisSpot;
        if (location.search) {
            thisID = params.get("id").replace("-", '/');
            thisJson = `../${thisID}`;

            if (params.get("area")) {
                thisArea = params.get("area").replace("-", '/');
                thisJson += `/${thisArea}`;
            };

            if (params.get("name")) {
                thisJson += `/${params.get("name")}.json`;
            } else {
                thisJson += "/index.json";
            };

            spotJSON(thisJson);
        } else {
            thisSpot = shuffle(spotLog)[0];
            location.replace("../" + thisSpot[1]);
        };
    </script>
