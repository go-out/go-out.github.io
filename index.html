    <style>
        main {
            position: relative;
            width: 100%;
            height: calc(100dvh - 3rem);
        }

        #map {
            max-height: 100%;
        }

    <script src="index/js/map.js"></script>
    <script src="log.js"></script>
    <script>
        const directory = "";

        // ?month=MM
        let params = new URLSearchParams(location.search),
            thisMonth,
            thisDate;

        if (params.get("month")) {
            thisMonth = params.get("month");
        } else {
            thisMonth = today.getMonth() + 1;
            thisDate = today.getDate();
        };

        switch (document.readyState) {
            case "loading":
                mapSpot.forEach(function (eachArr) {
                    const js = document.createElement('script');
                    js.src = directory + eachArr[0] + '/' + eachArr[1] + '/' + eachArr[2] + '.js?' + eachArr[3];
                    document.head.appendChild(js);
                }, false);
                break;
        };

        window.addEventListener("load", () => {
            indexSpot(updatelog.length);

            mapSpot.forEach(function (eachArr) {
                let arr = eval(eachArr[1] + eachArr[2]);
                Function(featureSpot(arr))();
            }, false);

            if (!/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                const scrollElement = document.querySelector('#spot')
                scrollElement.addEventListener('wheel', (e) => {
                    e.preventDefault()

                    if (Math.abs(e.deltaY) < Math.abs(e.deltaX)) return;
                    const maxScrollLeft = scrollElement.scrollWidth - scrollElement.clientWidth;
                    if (
                        (scrollElement.scrollLeft <= 0 && e.deltaY < 0) ||
                        (scrollElement.scrollLeft >= maxScrollLeft && e.deltaY > 0)
                    ) return;
                    scrollElement.scrollLeft += e.deltaY;
                });
            };
        });
    </script>

    <!-- Mapbox -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet" />
</head>

<body>
    <main>
        <h1>
            <strong>Go Out</strong>
            <button>Let's have some fun</button>
        </h1>
        <section>
            <h2>
                <b>Life is precious. Every minute. And more precious with you in it.</b><br>
                <u>from "Jon Brion - Little Person"</u>
            </h2>
            <h3>
                <u>知っていることの</u>
                <b>外へ</b>
                <u>わからないところまで</u>
                <b>出かける</b>
            </h3>
        </section>
        <div id="map"></div>
    </main>

    <article>
        <section id="calender">
            <details>
                <summary>
                    <b id="lastModified">最終更新日</b>
                    <small>Latest Update</small>
                </summary>
                <ul id="log"></ul>
            </details>
            <ul id="spot">
                <h3>
                    <ruby>
                        <b>旬のスポット・エリア</b>
                        <rt>Let's Go Out and Play</rt>
                    </ruby>
                </h3>
            </ul>
            <details>
                <summary>
                    <b>毎月の出来事</b>
                    <small>Monthly Events</small>
                </summary>
                <ul id="every"></ul>
            </details>
        </section>
    </article>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoicGVodSIsImEiOiJja3R4Y3diNmIybTg5Mm9waWgwYTdsc3FyIn0.lVvnPZ3aa6332EaWJIxPaQ';

        let style = 'mapbox://styles/pehu/ckx1e2xhw13kw14s4rjhaiv17',
            center = [135.5062638133726, 34.65238308472434],
            bounds = null,
            zoom = 1.5;

        const map = new mapboxgl.Map({
            container: 'map',
            center: center,
            style: style,
            pitch: 0,
            bearing: 0,
            zoom: zoom,
            scrollZoom: 1,
            maxBounds: bounds,
            projection: 'mercator',
            attributionControl: false
        });

        map.addControl(
            new mapboxgl.GeolocateControl({
                positionOptions: {
                    enableHighAccuracy: true
                },
                // デバイスの位置の変更に応じて位置情報を更新
                trackUserLocation: true,
                // デバイスが向いている方向を矢印で描画
                showUserHeading: true
            }), 'bottom-right'
        )
        map.addControl(new mapboxgl.NavigationControl())

        // 右クリックイベント
        map.on("contextmenu", (e) => {
            let thisLngLat = [e.lngLat.lng, e.lngLat.lat]
            const popup = new mapboxgl.Popup()
                .setLngLat(thisLngLat)
                .setHTML(thisLngLat)
                .addTo(map);
        });

        let userInteracting = 0;

        function spinGlobe() {
            const zoom = map.getZoom();
            if (!userInteracting && zoom < 5) {
                let e = 5;
                if (zoom > 3) {
                    e *= (5 - zoom) / 2
                }
                const lng = map.getCenter();
                lng.lng += e,
                    map.easeTo({
                        center: lng,
                        easing: zoom => zoom
                    })
            }
        }
        map.on("mousedown", () => { userInteracting = !0 }),
            map.on("dragstart", () => { userInteracting = !0 }),
            map.on("moveend", () => { spinGlobe() }),
            spinGlobe()
    </script>
</body>

</html>
