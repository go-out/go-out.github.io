<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">

    <!--og:meta-->
    <meta content="website" property="og:type">
    <title>Go Out | 渡し船に乗ろう</title>
    <meta content="Go Out | 渡し船に乗ろう" property="og:title">
    <meta content="Osaka Ferry Virtual Cruise" name="description">
    <meta content="Osaka Ferry Virtual Cruise" property="og:description">

    <!--for Twitter-->
    <meta content="summary_large_image" name="twitter:card">
    <meta content="https://creative-community.space/map/osaka/ferry/" property="og:url">
    <meta content="https://creative-community.space/map/osaka/ferry/index.png" property="og:image">
    <meta content="https://creative-community.space/map/osaka/ferry/index.png" name="twitter:image:src">

    <link rel="icon" href="icon.png">
    <link rel="icon" href="icon.png" sizes="192x192">
    <link rel="apple-touch-icon-precomposed" href="icon.png" sizes="180x180">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../vr/index.css">

    <script src="../../vr/index.js"></script>
    <script>
        // ?name=名前

        const urlParam = location.search.substring(1)
        if (urlParam) {
            let paramArr = [],
                param = urlParam.split('&')
            for (arr = 0; arr < param.length; arr++) {
                var paramItem = param[arr].split('=')
                paramArr[paramItem[0]] = paramItem[1]
            }
            let json = paramArr.name + '.json'
            indexJSON(json)
        } else {
            let json = 'index.json'
            indexJSON(json)
        }
    </script>
</head>

<body class="start">
    <main>
        <header>
            <small id="year"></small>
            <h1>
                <strong>Go Out</strong>
            </h1>
            <h2>
                <strong id="month"></strong>
                <strong id="day"></strong>
            </h2>
            <button id="play" type="button"></button>
        </header>
    </main>

    <article>
        <h3>
            <strong id="title"></strong>
        </h3>
        <section id="info"></section>
        <div id="links" hidden>
            <h3>関連ページ Related Pages</h3>
        </div>
    </article>

    <footer>
        <hr>
        <button onclick="history.back()">↩︎</button>
        <select name="ferry" id="osaka">
            <option selected disabled>大阪市渡船一覧</option>
            <option value="?name=tempozan">天保山渡船</option>
            <option value="?name=zonbee">甚兵衛渡船</option>
            <option value="?name=chitose">千歳渡船</option>
            <option value="?name=ochiaikami">落合上渡船</option>
            <option value="?name=ochiaishimo">落合下渡船</option>
            <option value="?name=senbonmatsu">千本松渡船</option>
            <option value="?name=funamachi">船町渡船</option>
            <option value="?name=kizugawa">木津川渡船</option>
        </select>
    </footer>

    <script>
        function valueChange(e) {
            // イベントが発生した時の処理
            e.preventDefault();
            let url = this.value;
            location.assign(url)
        }

        let selectAll = document.querySelectorAll('select');
        selectAll.forEach((select) => {
            select.addEventListener('change', valueChange);
        });
    </script>
</body>

</html>
